{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Certa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        nav { background: #2c3e50; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { color: white; font-size: 1.2rem; }
        nav h1 span { color: #3498db; }
        nav a { color: white; text-decoration: none; }
        .container { padding: 2rem; max-width: 1200px; margin: 0 auto; }
        h2 { color: #2c3e50; margin-bottom: 1rem; }
        p { color: #555; line-height: 1.6; }
    </style>
</head>
<body>
    <nav>
        <h1>Grade <span>Certa</span></h1>
        <a href="{% url 'logout' %}">Sair</a>
    </nav>
    <div class="container">
        <h2>Bem-vindo, {{ user.first_name|default:user.email }}!</h2>
        <p>Sistema de gestao de grades horarias escolares.</p>
    </div>
</body>
</html>
