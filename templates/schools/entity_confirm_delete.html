{% extends "base.html" %}

{% block title %}Grade Certa — Excluir {{ model_verbose_name|title }}{% endblock %}

{% block body %}
<main class="page-content">
    <div class="container">
        <div class="card">
            <div class="card__header">
                <h1 class="card__title">Excluir {{ model_verbose_name|title }}</h1>
            </div>
            <p>Confirma a exclusão de <strong>{{ object }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit">Confirmar exclusão</button>
                <a href="{% url list_url_name %}">Cancelar</a>
            </form>
        </div>
    </div>
</main>
{% endblock %}
