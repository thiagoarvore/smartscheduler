{% extends "base.html" %}

{% block title %}Grade Certa — {{ model_verbose_name|title }}{% endblock %}

{% block body %}
<main class="page-content">
    <div class="container">
        <div class="card">
            <div class="card__header">
                <h1 class="card__title">{{ model_verbose_name|title }}</h1>
            </div>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Salvar</button>
                <a href="{% url list_url_name %}">Voltar</a>
            </form>
        </div>
    </div>
</main>
{% endblock %}
