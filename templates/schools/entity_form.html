{% extends "base.html" %}

{% block title %}Grade Certa — {{ model_verbose_name|title }}{% endblock %}

{% block page_content %}
<div class="page-header mb-6">
    <a href="{% url list_url_name %}" class="btn btn--ghost btn--sm mb-4">
        ← Voltar
    </a>
    <h1 class="page-title">{{ model_verbose_name|title }}</h1>
</div>

<div class="card" style="max-width: 640px;">
    <form method="post" class="form-stack">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn btn--primary">Salvar</button>
            <a href="{% url list_url_name %}" class="btn btn--ghost">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
